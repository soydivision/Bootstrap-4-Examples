<body style="background-color: #D0D0D0;">
  <h1>Hello, world!</h1>
  <h1>Containers</h1>
  <div class="container-sm bg-primary">100% wide until small breakpoint</div>
  <div class="container-md bg-warning">100% wide until medium breakpoint</div>
  <div class="container-lg bg-info">100% wide until large breakpoint</div>
  <div class="container-xl bg-danger">100% wide until extra large breakpoint</div>
  <div class="container-xxl bg-info">100% wide until extra extra large breakpoint</div>
  <br>
  <div class="container-fluid bg-success"> Fluid container </div>
  <br>
  <h1>Grid system</h1>
  <div class="container bg-primary">
    <div class="row">
      <div class="col bg-warning">
        Column
      </div>
      <div class="col bg-info">
        Column
      </div>
      <div class="col bg-danger">
        Column
      </div>
    </div>
  </div>
